<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Building Society Climate Briefing</title>
    <style>
        body { font-family: -apple-system, sans-serif; line-height: 1.6; max-width: 800px; margin: 0 auto; padding: 20px; background: #f0f2f5; }
        .theme-card { background: white; padding: 20px; margin-bottom: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        h1 { color: #1a365d; text-align: center; }
        h3 { color: #2c5282; margin-top: 0; }
        p { color: #4a5568; }
        .links { font-size: 0.85rem; border-top: 1px solid #edf2f7; pt: 10px; margin-top: 10px; }
        a { color: #3182ce; text-decoration: none; margin-right: 15px; }
    </style>
</head>
<body>
    <h1>Climate Risk Briefing</h1>
    <div id="container">Loading intelligence...</div>

    <script>
        async function loadBriefing() {
            try {
                const response = await fetch('./tailored_news.json');
                const data = await response.json();
                const container = document.getElementById('container');
                container.innerHTML = '';

                data.forEach(item => {
                    const card = document.createElement('div');
                    card.className = 'theme-card';
                    const linksHtml = item.links.map(l => `<a href="${l}" target="_blank">View Source</a>`).join('');
                    card.innerHTML = `
                        <h3>${item.theme}</h3>
                        <p>${item.briefing}</p>
                        <div class="links">${linksHtml}</div>
                    `;
                    container.appendChild(card);
                });
            } catch (e) {
                document.getElementById('container').innerText = 'Briefing not found. Run the Action first!';
            }
        }
        loadBriefing();
    </script>
</body>
</html>
